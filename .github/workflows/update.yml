name: Update casks

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        cask: [zoho-trident, zoho-workdrive-truesync]
    env:
      HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HOMEBREW_NO_AUTO_UPDATE: "1"
      TAP: aidanwright/zoho
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Link working copy as tap
        run: |
          TAP_PATH="$(brew --repository)/Library/Taps/aidanwright/homebrew-zoho"
          mkdir -p "$(dirname "$TAP_PATH")"
          rm -rf "$TAP_PATH"
          ln -s "$GITHUB_WORKSPACE" "$TAP_PATH"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git -C "$GITHUB_WORKSPACE" remote set-head origin --auto

      - name: Check for update
        id: check
        run: bash scripts/update-cask.sh "$TAP/${{ matrix.cask }}" --check

      - name: Open PR
        id: pr
        if: steps.check.outputs.update_needed == 'true'
        run: |
          set +e
          out="$(brew bump-cask-pr --no-fork --no-audit --no-style \
            --version="${{ steps.check.outputs.version }}" \
            "$TAP/${{ matrix.cask }}" 2>&1)"
          rc=$?
          echo "$out"
          [ $rc -eq 0 ] || exit $rc
          url="$(printf '%s\n' "$out" | grep -oE 'https://github.com/[^ ]+/pull/[0-9]+' | tail -1)"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        if: steps.check.outputs.update_needed == 'true' && steps.pr.outputs.url != ''
        run: gh pr merge "${{ steps.pr.outputs.url }}" --auto --squash --delete-branch
